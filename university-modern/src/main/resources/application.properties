# =============================================================================
# application.properties — Main configuration for University Modern
# =============================================================================

# Tell Spring MVC to trust forwarded headers (X-Forwarded-For, etc.).
# Needed when the app sits behind a reverse proxy or load balancer.
server.forward-headers-strategy=FRAMEWORK

# Print every SQL statement Spring Data sends to the database.
# Very useful for learning what Hibernate generates under the hood.
spring.jpa.show-sql=true

# 'none' = Hibernate will NOT modify the database schema at startup.
# We manage the schema ourselves via postgres/schema.sql.
spring.jpa.hibernate.ddl-auto=none

# PostgreSQL database connection — defaults for local development.
# In Docker Compose these are overridden by environment variables.
spring.datasource.url=jdbc:postgresql://localhost:5432/catalog
spring.datasource.username=user
spring.datasource.password=pass
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================================================
# Java 21 — Virtual Threads (Spring Boot 3.2+ auto-config)
# =============================================================================
# ONE LINE to unlock Virtual Threads for all incoming HTTP requests.
#
# What are Virtual Threads?
#   A normal OS thread is expensive — think of it like hiring a full-time
#   employee.  A virtual thread is like a task card that can run on any
#   available worker.  The JVM manages millions of them cheaply.
#
# What does this do?
#   Spring Boot replaces Tomcat's fixed thread pool with virtual threads.
#   Every HTTP request gets its own virtual thread — no blocking, no waiting.
spring.threads.virtual.enabled=true

# Show friendly RFC-7807 Problem Detail JSON on errors instead of whitepage.
# Example: { "type": "...", "title": "Not Found", "status": 404, "detail": "..." }
spring.mvc.problemdetails.enabled=true

# =============================================================================
# Spring Boot Actuator — Production Health & Metrics Endpoints
# =============================================================================
#
# Actuator adds a /actuator/* set of endpoints for monitoring the live app.
# Kubernetes uses two of them as health probes — without these, K8s cannot
# know whether your pod is alive or ready to receive traffic:
#
#   /actuator/health/liveness  \u2192 K8s livenessProbe  (is the JVM still running?)
#   /actuator/health/readiness \u2192 K8s readinessProbe (is the DB connection ready?)
#   /actuator/metrics          \u2192 raw metrics for Prometheus / Grafana dashboards
#   /actuator/info             \u2192 app name, version, description
#
# expose.include = comma-separated list of endpoints to turn on over HTTP.
# In a real production app you'd put /actuator behind a private network rule
# or a Spring Security filter so external users can't read your metrics.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Application info shown at GET /actuator/info
management.info.env.enabled=true
info.app.name=university-modern
info.app.version=1.0.0
info.app.description=University Modern \u2014 principal architect cloud readiness demo (Java 21 + Spring Boot 3.3.5)
info.app.java-version=21

# =============================================================================
# HikariCP Connection Pool \u2014 Tuned for Cloud-Managed PostgreSQL
# =============================================================================
#
# HikariCP is the default connection pool used by Spring Boot.
# Think of it as a parking garage for database connections:
#   - Opening a new DB connection is slow (like driving to the store from scratch).
#   - A pool keeps N connections already open and hands them out on demand (fast).
#
# Cloud-hosted PostgreSQL services (AWS RDS, Azure Flexible Server, GCP Cloud SQL)
# automatically DROP idle connections after 5\u201310 minutes of no activity.
# If HikariCP doesn\u2019t know a connection was dropped, the next request will fail
# with "connection closed unexpectedly".  These settings prevent that:
#
#   maximum-pool-size : maximum simultaneous DB connections (scale based on vCPU)
#   minimum-idle      : always keep this many warm connections available
#   idle-timeout      : close a connection that has been unused for 10 minutes
#   connection-timeout: wait at most 30 seconds before declaring \u201cno connection available\u201d
#   keepalive-time    : ping each idle connection every 2 minutes so the cloud
#                       provider does NOT close it as idle
#   pool-name         : labels appear in logs and metrics (easier debugging)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.pool-name=UniversityHikariPool
