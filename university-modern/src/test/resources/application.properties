# =============================================================================
# application.properties (TEST) — Overrides for unit and integration tests
# =============================================================================

# Use H2 — a tiny database that lives entirely in Java's memory.
# It spins up before each test and disappears after, so tests never
# interfere with each other or with the real PostgreSQL database.
# MODE=PostgreSQL makes H2 behave like Postgres (same SQL dialect).
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 'create-drop' = Hibernate creates all tables before the test and drops
# them at the end.  Combined with data.sql, tests start with known data.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Let Spring run data.sql to pre-populate the in-memory database.
spring.sql.init.mode=always

# H2 dialect — Hibernate chooses the right SQL syntax for H2.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Virtual threads still work in tests — keep the same config.
spring.threads.virtual.enabled=true
spring.mvc.problemdetails.enabled=true
